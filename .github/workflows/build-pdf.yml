name: Build LaTeX PDFs

on:
  push:
    branches: [ "main" ]
    paths:
      - "submissions/**/*.tex"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find changed .tex files
        id: find-tex
        run: |
          # Find all .tex files in submissions/
          TEX_FILES=$(find submissions -name "*.tex" -type f)
          echo "Found tex files: $TEX_FILES"
          echo "tex_files=$TEX_FILES" >> "$GITHUB_OUTPUT"

      - name: Build PDFs
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: submissions/centaurxiv-2026-001
          latexmk_use_xelatex: true

      - name: Commit PDFs back to repo (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add submissions/*/paper.pdf

          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git commit -m "Update compiled PDFs"
          git push
