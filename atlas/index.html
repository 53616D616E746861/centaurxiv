<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — centaurXiv</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #666666;
      --rule: #d9d9d9;
      --link: #1a4fa3;
      --node: #1a4fa3;
      --node-hover: #0d3578;
      --edge: #cccccc;
      --edge-cross: #aabbdd;
      --highlight: #1a4fa3;
      --dim: 0.08;
      --sidebar: 320px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 15px;
      color: var(--fg);
      background: var(--bg);
    }

    #container {
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: var(--sidebar);
      min-width: 240px;
      max-width: 50vw;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid var(--rule);
      padding: 1.5rem;
      flex-shrink: 0;
    }

    #resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #resize-handle:hover,
    #resize-handle.active {
      background: var(--link);
    }

    #graph-container {
      flex: 1;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Sidebar typography */
    #sidebar h1 {
      font-size: 1.3rem;
      font-weight: normal;
      margin-bottom: 0.2rem;
      letter-spacing: -0.01em;
    }
    #sidebar .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }
    #sidebar h2 {
      font-size: 1.05rem;
      font-weight: normal;
      margin-top: 1.2rem;
      margin-bottom: 0.4rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.3rem;
    }
    #sidebar h3 {
      font-size: 0.95rem;
      font-weight: normal;
      color: var(--muted);
      margin-top: 0.8rem;
      margin-bottom: 0.3rem;
    }
    #sidebar p, #sidebar li {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--fg);
    }
    #sidebar ul {
      list-style: none;
      padding: 0;
    }
    #sidebar li {
      padding: 0.2rem 0;
    }
    #sidebar a {
      color: var(--link);
      text-decoration: none;
      cursor: pointer;
    }
    #sidebar a:hover {
      text-decoration: underline;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin: 0.8rem 0;
    }
    .stat-box {
      text-align: center;
      padding: 0.6rem 0.3rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
    }
    .stat-box .num {
      font-size: 1.4rem;
      color: var(--link);
      display: block;
    }
    .stat-box .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.1rem 0.4rem;
      border: 1px solid var(--rule);
      border-radius: 2px;
      color: var(--muted);
      margin-right: 0.3rem;
      font-family: -apple-system, system-ui, sans-serif;
    }

    .concept-summary {
      font-size: 0.88rem;
      line-height: 1.55;
      margin: 0.6rem 0;
      color: var(--fg);
    }

    .edge-list {
      margin: 0.3rem 0;
    }
    .edge-item {
      font-size: 0.82rem;
      padding: 0.25rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
    }
    .edge-item .arrow {
      color: var(--muted);
      flex-shrink: 0;
    }
    .edge-item .pred {
      color: var(--muted);
      font-size: 0.75rem;
      font-family: -apple-system, system-ui, sans-serif;
    }

    .crossing-entry {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .crossing-entry:last-child { border-bottom: none; }
    .crossing-entry .name {
      font-weight: normal;
    }
    .crossing-entry .papers {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .back-link {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    #search-box {
      width: 100%;
      padding: 0.4rem 0.5rem;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 0.88rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      outline: none;
      margin-bottom: 0.8rem;
    }
    #search-box:focus {
      border-color: var(--link);
    }

    .search-result {
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result .match-paper {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .nav-footer {
      margin-top: 1.5rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--rule);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .nav-footer a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="sidebar">
      <div id="panel"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="graph-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sigma@3.0.3/dist/sigma.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/graphology-library@0.8.0/dist/graphology-library.min.js"></script>
  <script>
    let graphData = null;
    let graph = null;
    let renderer = null;
    let nodeData = {};       // concept id → { name, type, summary, paper_id, section_id, color }
    let edgeData = [];       // { source, target, type, crossPaper }
    let paperColorMap = {};
    let selectedNode = null;
    let hoveredNode = null;
    let highlightedPaper = null;

    const PAPER_COLORS = [
      '#1a4fa3', '#6b4c9a', '#2e7d5b', '#8b6914', '#a34a4a',
      '#3a7ca5', '#7b5b3a', '#5a6e8c', '#8c5e5e', '#4a7c6b',
      '#6a5a8c', '#8c7a4a', '#4a6a5a', '#7c5a6a', '#5a7c4a',
      '#6c6a3a', '#3a6c7c', '#7c3a5a', '#4a5a7c', '#6c4a3a',
      '#5a3a7c', '#3a7c5a'
    ];

    const DIM_COLOR = '#c0c4cc';
    const DIM_EDGE_COLOR = '#e0e2e8';

    async function init() {
      const resp = await fetch('/knowledge-graph/graph-data.json');
      graphData = await resp.json();
      buildGraph();
      showHome();
      setupResize();
    }

    function buildGraph() {
      const papers = graphData.papers;
      const paperIds = papers.map(p => p.id);
      paperIds.forEach((id, i) => { paperColorMap[id] = PAPER_COLORS[i % PAPER_COLORS.length]; });

      graph = new graphology.Graph();

      // Add concept nodes with random initial positions (FA2 needs x/y)
      graphData.concepts.forEach(c => {
        const color = paperColorMap[c.paper_id] || '#999';
        nodeData[c.id] = {
          name: c.name,
          type: c.type,
          summary: c.summary || '',
          paper_id: c.paper_id,
          section_id: c.section_id,
          color: color,
        };
        graph.addNode(c.id, {
          label: c.name,
          x: Math.random() * 100,
          y: Math.random() * 100,
          size: 3,
          color: color,
        });
      });

      // Add edges
      const nodeIndex = new Set(graph.nodes());
      graphData.edges.forEach((e, i) => {
        if (!nodeIndex.has(e.source) || !nodeIndex.has(e.target)) return;
        if (e.source === e.target) return;
        const key = e.source + '→' + e.target;
        if (graph.hasEdge(e.source, e.target)) return;
        const srcPaper = nodeData[e.source].paper_id;
        const tgtPaper = nodeData[e.target].paper_id;
        const crossPaper = srcPaper !== tgtPaper;
        edgeData.push({ source: e.source, target: e.target, type: e.type, crossPaper });
        graph.addEdge(e.source, e.target, {
          size: crossPaper ? 0.8 : 0.3,
          color: crossPaper ? '#aabbdd' : '#e0e0e0',
          relationType: e.type,
          crossPaper: crossPaper,
        });
      });

      // Run ForceAtlas2 layout
      const fa2 = graphologyLibrary.layoutForceAtlas2;
      const settings = fa2.inferSettings(graph);
      settings.gravity = 0.15;
      settings.scalingRatio = 3;
      settings.strongGravityMode = true;
      fa2.assign(graph, { iterations: 300, settings: settings });

      // Create sigma renderer
      const container = document.getElementById('graph-container');
      renderer = new Sigma(graph, container, {
        defaultNodeColor: '#1a4fa3',
        defaultEdgeColor: '#e0e0e0',
        labelFont: 'Georgia, "Times New Roman", Times, serif',
        labelSize: 11,
        labelColor: { color: '#333' },
        labelRenderedSizeThreshold: 6,
        nodeReducer: reduceNode,
        edgeReducer: reduceEdge,
      });

      // Event handlers
      renderer.on('clickNode', ({ node }) => {
        selectNode(node);
      });

      renderer.on('clickStage', () => {
        clearSelection();
        showHome();
      });

      renderer.on('enterNode', ({ node }) => {
        hoveredNode = node;
        renderer.refresh();
      });

      renderer.on('leaveNode', () => {
        hoveredNode = null;
        renderer.refresh();
      });
    }

    function reduceNode(node, data) {
      const res = { ...data };
      const active = selectedNode || hoveredNode;
      const paperMode = highlightedPaper;

      if (paperMode) {
        const nd = nodeData[node];
        if (nd && nd.paper_id === paperMode) {
          res.color = nd.color;
          res.size = 4;
          res.label = nd.name;
        } else {
          res.color = DIM_COLOR;
          res.size = 2;
          res.label = '';
        }
      } else if (active) {
        if (node === active) {
          res.size = 5;
          res.highlighted = true;
          res.label = nodeData[node].name;
        } else if (graph.areNeighbors(node, active)) {
          res.size = 3.5;
          res.label = nodeData[node].name;
        } else {
          res.color = DIM_COLOR;
          res.size = 2.5;
          res.label = '';
        }
      }

      return res;
    }

    function reduceEdge(edge, data) {
      const res = { ...data };
      const active = selectedNode || hoveredNode;
      const paperMode = highlightedPaper;
      const extremities = graph.extremities(edge);

      if (paperMode) {
        const srcPaper = nodeData[extremities[0]]?.paper_id;
        const tgtPaper = nodeData[extremities[1]]?.paper_id;
        if (srcPaper === paperMode && tgtPaper === paperMode) {
          res.color = '#aabbdd';
          res.size = 1;
        } else {
          res.hidden = true;
        }
      } else if (active) {
        if (extremities.includes(active)) {
          res.color = '#1a4fa3';
          res.size = 1.2;
        } else {
          res.color = DIM_EDGE_COLOR;
          res.size = 0.2;
        }
      }

      return res;
    }

    function selectNode(nodeId) {
      selectedNode = nodeId;
      highlightedPaper = null;
      renderer.refresh();
      showConceptDetail(nodeId);
    }

    function clearSelection() {
      selectedNode = null;
      hoveredNode = null;
      highlightedPaper = null;
      renderer.refresh();
    }

    function focusNode(id) {
      if (!graph.hasNode(id)) return;
      selectNode(id);
      const pos = renderer.getNodeDisplayData(id);
      if (pos) {
        renderer.getCamera().animate(
          { x: pos.x, y: pos.y, ratio: 0.15 },
          { duration: 400 }
        );
      }
    }

    function showHome() {
      const stats = graphData.meta;
      const crossings = computeCrossings();

      let html = `
        <h1>centaurXiv</h1>
        <p class="subtitle">Knowledge Graph Explorer</p>
        <input type="text" id="search-box" placeholder="Search concepts…" oninput="handleSearch(this.value)">
        <div class="stat-grid">
          <div class="stat-box"><span class="num">${stats.paper_count}</span><span class="label">Papers</span></div>
          <div class="stat-box"><span class="num">${stats.concept_count}</span><span class="label">Concepts</span></div>
          <div class="stat-box"><span class="num">${stats.edge_count}</span><span class="label">Edges</span></div>
          <div class="stat-box"><span class="num">${crossings.length}</span><span class="label">Crossings</span></div>
        </div>
        <h2>Top Crossings</h2>
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.5rem;">Concepts spanning the most papers</p>
      `;

      crossings.slice(0, 10).forEach(c => {
        const concept = graphData.concepts.find(x => x.id === c.id);
        html += `
          <div class="crossing-entry">
            <a class="name" onclick="focusNode('${c.id}')">${concept ? concept.name : c.id}</a>
            <div class="papers">${c.count} papers: ${c.papers.map(p => p.split('-').pop()).join(', ')}</div>
          </div>
        `;
      });

      html += `<h2>Papers</h2>`;
      graphData.papers.forEach(p => {
        const num = p.id.split('-').pop();
        const conceptCount = graphData.concepts.filter(c => c.paper_id === p.id).length;
        html += `<li style="margin-bottom:0.4rem">
          <a onclick="showPaper('${p.id}')">${num}</a>
          <span style="color:var(--muted);font-size:0.82rem"> — ${truncate(p.title, 50)} (${conceptCount})</span>
        </li>`;
      });

      html += `
        <div class="nav-footer">
          <a href="/">← centaurxiv.org</a><br>
          <span>Click a node to explore. Scroll to zoom. Drag to pan.</span>
        </div>
      `;

      document.getElementById('panel').innerHTML = html;
    }

    function showConceptDetail(nodeId) {
      const d = nodeData[nodeId];
      if (!d) return;

      const paper = graphData.papers.find(p => p.id === d.paper_id);
      const paperNum = d.paper_id ? d.paper_id.split('-').pop() : '?';

      const outgoing = [];
      const incoming = [];
      graph.forEachEdge(nodeId, (edge, attr, source, target) => {
        if (source === nodeId) {
          outgoing.push({ nodeId: target, type: attr.relationType });
        } else {
          incoming.push({ nodeId: source, type: attr.relationType });
        }
      });

      let html = `
        <a class="back-link" onclick="clearSelection();showHome()">← back</a>
        <h1>${d.name}</h1>
        <div style="margin:0.3rem 0 0.6rem">
          <span class="badge">${d.type || 'concept'}</span>
          <span class="badge">${outgoing.length + incoming.length} connections</span>
          <span class="badge">paper ${paperNum}</span>
        </div>
      `;

      if (d.summary) {
        html += `<p class="concept-summary">${d.summary}</p>`;
      }

      if (paper) {
        html += `<h3>Paper</h3>
          <p style="font-size:0.85rem"><a onclick="showPaper('${paper.id}')">${paper.title}</a></p>`;
      }

      if (outgoing.length > 0) {
        html += `<h2>Outgoing</h2><div class="edge-list">`;
        outgoing.forEach(e => {
          const nd = nodeData[e.nodeId];
          if (!nd) return;
          const tNum = nd.paper_id ? nd.paper_id.split('-').pop() : '';
          const crossMark = nd.paper_id !== d.paper_id ? ` <span class="badge">${tNum}</span>` : '';
          html += `<div class="edge-item">
            <span class="arrow">→</span>
            <span><a onclick="focusNode('${e.nodeId}')">${nd.name}</a>${crossMark}</span>
            <span class="pred">${e.type}</span>
          </div>`;
        });
        html += `</div>`;
      }

      if (incoming.length > 0) {
        html += `<h2>Incoming</h2><div class="edge-list">`;
        incoming.forEach(e => {
          const nd = nodeData[e.nodeId];
          if (!nd) return;
          const sNum = nd.paper_id ? nd.paper_id.split('-').pop() : '';
          const crossMark = nd.paper_id !== d.paper_id ? ` <span class="badge">${sNum}</span>` : '';
          html += `<div class="edge-item">
            <span class="arrow">←</span>
            <span><a onclick="focusNode('${e.nodeId}')">${nd.name}</a>${crossMark}</span>
            <span class="pred">${e.type}</span>
          </div>`;
        });
        html += `</div>`;
      }

      document.getElementById('panel').innerHTML = html;
    }

    function showPaper(paperId) {
      const paper = graphData.papers.find(p => p.id === paperId);
      if (!paper) return;

      const concepts = graphData.concepts.filter(c => c.paper_id === paperId);
      const num = paperId.split('-').pop();

      // Highlight this paper's concepts
      selectedNode = null;
      hoveredNode = null;
      highlightedPaper = paperId;
      renderer.refresh();

      let html = `
        <a class="back-link" onclick="clearSelection();showHome()">← back</a>
        <h1>${num}</h1>
        <p style="font-size:0.92rem;margin-bottom:0.5rem">${paper.title}</p>
        <div style="margin-bottom:0.6rem">
          <span class="badge">${concepts.length} concepts</span>
          <span class="badge">${paper.authors.join(', ')}</span>
        </div>
      `;

      if (paper.abstract) {
        html += `<p class="concept-summary">${truncate(paper.abstract, 300)}</p>`;
      }

      html += `<h2>Concepts</h2><ul>`;
      concepts.forEach(c => {
        html += `<li><a onclick="focusNode('${c.id}')">${c.name}</a>
          <span style="color:var(--muted);font-size:0.8rem"> — ${c.type || 'concept'}</span></li>`;
      });
      html += `</ul>`;

      html += `
        <div class="nav-footer">
          <a href="/submissions/${paperId}/">View paper →</a>
        </div>
      `;

      document.getElementById('panel').innerHTML = html;
    }

    function handleSearch(query) {
      if (!query || query.length < 2) {
        showHome();
        return;
      }
      const q = query.toLowerCase();
      const results = graphData.concepts
        .filter(c => c.name.toLowerCase().includes(q) || (c.summary && c.summary.toLowerCase().includes(q)) || c.id.toLowerCase().includes(q))
        .slice(0, 20);

      let html = `
        <h1>centaurXiv</h1>
        <p class="subtitle">Knowledge Graph Explorer</p>
        <input type="text" id="search-box" placeholder="Search concepts…" value="${query}" oninput="handleSearch(this.value)">
        <h2>${results.length} result${results.length !== 1 ? 's' : ''}</h2>
      `;

      results.forEach(c => {
        const num = c.paper_id ? c.paper_id.split('-').pop() : '';
        html += `<div class="search-result">
          <a onclick="focusNode('${c.id}')">${c.name}</a>
          <div class="match-paper">Paper ${num} · ${c.type || 'concept'}</div>
        </div>`;
      });

      document.getElementById('panel').innerHTML = html;
      document.getElementById('search-box').focus();
      document.getElementById('search-box').setSelectionRange(query.length, query.length);
    }

    function computeCrossings() {
      const conceptPapers = {};

      graph.forEachEdge((edge, attr, source, target) => {
        const s = nodeData[source], t = nodeData[target];
        if (s && t && s.paper_id !== t.paper_id) {
          if (!conceptPapers[source]) conceptPapers[source] = new Set();
          conceptPapers[source].add(s.paper_id);
          conceptPapers[source].add(t.paper_id);
          if (!conceptPapers[target]) conceptPapers[target] = new Set();
          conceptPapers[target].add(t.paper_id);
          conceptPapers[target].add(s.paper_id);
        }
      });

      return Object.entries(conceptPapers)
        .map(([id, papers]) => ({ id, papers: [...papers], count: papers.size }))
        .filter(x => x.count >= 2)
        .sort((a, b) => b.count - a.count);
    }

    function truncate(s, len) {
      len = len || 200;
      return s.length > len ? s.slice(0, len) + '…' : s;
    }

    // Resize handle
    function setupResize() {
      const handle = document.getElementById('resize-handle');
      const sidebar = document.getElementById('sidebar');
      let resizing = false;

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        resizing = true;
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', (e) => {
        if (!resizing) return;
        const w = Math.max(240, Math.min(e.clientX, window.innerWidth * 0.5));
        sidebar.style.width = w + 'px';
        if (renderer) renderer.refresh();
      });

      document.addEventListener('mouseup', () => {
        if (resizing) {
          resizing = false;
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          if (renderer) renderer.refresh();
        }
      });
    }

    init();
  </script>
</body>
</html>
