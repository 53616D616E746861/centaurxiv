<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — centaurXiv</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #666666;
      --rule: #d9d9d9;
      --link: #1a4fa3;
      --node: #1a4fa3;
      --node-hover: #0d3578;
      --edge: #888888;
      --edge-cross: #aabbdd;
      --highlight: #1a4fa3;
      --dim: 0.08;
      --sidebar: 320px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 15px;
      color: var(--fg);
      background: var(--bg);
    }

    #container {
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: var(--sidebar);
      min-width: 240px;
      max-width: 50vw;
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid var(--rule);
      padding: 1.5rem;
      flex-shrink: 0;
    }

    #resize-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #resize-handle:hover,
    #resize-handle.active {
      background: var(--link);
    }

    #graph-container {
      flex: 1;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    svg { width: 100%; height: 100%; }

    /* Sidebar typography */
    #sidebar h1 {
      font-size: 1.3rem;
      font-weight: normal;
      margin-bottom: 0.2rem;
      letter-spacing: -0.01em;
    }
    #sidebar .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }
    #sidebar h2 {
      font-size: 1.05rem;
      font-weight: normal;
      margin-top: 1.2rem;
      margin-bottom: 0.4rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.3rem;
    }
    #sidebar h3 {
      font-size: 0.95rem;
      font-weight: normal;
      color: var(--muted);
      margin-top: 0.8rem;
      margin-bottom: 0.3rem;
    }
    #sidebar p, #sidebar li {
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--fg);
    }
    #sidebar ul {
      list-style: none;
      padding: 0;
    }
    #sidebar li {
      padding: 0.2rem 0;
    }
    #sidebar a {
      color: var(--link);
      text-decoration: none;
      cursor: pointer;
    }
    #sidebar a:hover {
      text-decoration: underline;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin: 0.8rem 0;
    }
    .stat-box {
      text-align: center;
      padding: 0.6rem 0.3rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
    }
    .stat-box .num {
      font-size: 1.4rem;
      color: var(--link);
      display: block;
    }
    .stat-box .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.1rem 0.4rem;
      border: 1px solid var(--rule);
      border-radius: 2px;
      color: var(--muted);
      margin-right: 0.3rem;
      font-family: -apple-system, system-ui, sans-serif;
    }

    .concept-summary {
      font-size: 0.88rem;
      line-height: 1.55;
      margin: 0.6rem 0;
      color: var(--fg);
    }

    .edge-list {
      margin: 0.3rem 0;
    }
    .edge-item {
      font-size: 0.82rem;
      padding: 0.25rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
    }
    .edge-item .arrow {
      color: var(--muted);
      flex-shrink: 0;
    }
    .edge-item .pred {
      color: var(--muted);
      font-size: 0.75rem;
      font-family: -apple-system, system-ui, sans-serif;
    }

    .crossing-entry {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .crossing-entry:last-child { border-bottom: none; }
    .crossing-entry .name {
      font-weight: normal;
    }
    .crossing-entry .papers {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .back-link {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    #search-box {
      width: 100%;
      padding: 0.4rem 0.5rem;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 0.88rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      outline: none;
      margin-bottom: 0.8rem;
    }
    #search-box:focus {
      border-color: var(--link);
    }

    .filter-row {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.8rem;
    }
    .filter-row #search-box {
      flex: 1;
      margin-bottom: 0;
    }
    #paper-filter {
      width: 90px;
      padding: 0.4rem 0.3rem;
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 0.85rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      outline: none;
      background: var(--bg);
      color: var(--fg);
      flex-shrink: 0;
    }
    #paper-filter:focus {
      border-color: var(--link);
    }

    .search-result {
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result .match-paper {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Paper label in graph */
    .paper-label {
      font-family: Georgia, "Times New Roman", Times, serif;
      fill: var(--muted);
      font-size: 10px;
      text-anchor: middle;
      pointer-events: none;
      opacity: 0.6;
    }

    .nav-footer {
      margin-top: 1.5rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--rule);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .nav-footer a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="sidebar">
      <div id="panel"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="graph-container">
      <svg id="graph"></svg>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    let graphData = null;
    let simulation = null;
    let svg, g, linkGroup, nodeGroup;
    let nodes = [], links = [];
    let paperCenters = {};
    let selectedNode = null;
    let width, height;

    // Graph data is compiled from third-party submission content, so every
    // interpolated field must be HTML-escaped before it reaches innerHTML.
    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    const PAPER_COLORS = [
      '#1a4fa3', '#6b4c9a', '#2e7d5b', '#8b6914', '#a34a4a',
      '#3a7ca5', '#7b5b3a', '#5a6e8c', '#8c5e5e', '#4a7c6b',
      '#6a5a8c', '#8c7a4a', '#4a6a5a', '#7c5a6a', '#5a7c4a',
      '#6c6a3a', '#3a6c7c', '#7c3a5a', '#4a5a7c', '#6c4a3a',
      '#5a3a7c', '#3a7c5a'
    ];

    async function init() {
      try {
        const resp = await fetch('/knowledge-graph/graph-data.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        graphData = await resp.json();
      } catch (err) {
        document.getElementById('panel').innerHTML =
          '<h1>centaurXiv</h1><p class="subtitle">Knowledge Graph Explorer</p>' +
          '<p style="color:var(--muted)">Could not load the knowledge graph: ' +
          esc(err.message) + '</p>';
        return;
      }
      buildGraph();
      showHome();
      setupResize();
      setupPanelDelegation();
    }

    // Single delegated click handler for panel links. Replaces inline
    // onclick="fn('id')" so that ids never enter a JS-string-in-attribute
    // context (injection-safe) and links stay keyboard-accessible.
    function setupPanelDelegation() {
      document.getElementById('panel').addEventListener('click', (ev) => {
        const el = ev.target.closest('[data-action]');
        if (!el) return;
        ev.preventDefault();
        const action = el.getAttribute('data-action');
        const id = el.getAttribute('data-id');
        if (action === 'focus') focusNode(id);
        else if (action === 'paper') showPaper(id);
        else if (action === 'back') { clearSelection(); id ? showPaper(id) : showHome(); }
      });
    }

    function buildGraph() {
      const conceptsById = {};
      graphData.concepts.forEach(c => { conceptsById[c.id] = c; });

      const papers = graphData.papers;
      const paperIds = papers.map(p => p.id);
      const paperColorMap = {};
      paperIds.forEach((id, i) => { paperColorMap[id] = PAPER_COLORS[i % PAPER_COLORS.length]; });

      const graphEl = document.getElementById('graph-container');
      width = graphEl.clientWidth;
      height = graphEl.clientHeight;

      const cx = width / 2, cy = height / 2;
      paperIds.forEach((id, i) => {
        paperCenters[id] = {
          color: paperColorMap[id],
          label: id.split('-').pop()
        };
      });

      // Build nodes from concepts
      nodes = graphData.concepts.map(c => ({
        id: c.id,
        name: c.name,
        type: c.type,
        summary: c.summary || '',
        paper_id: c.paper_id,
        section_id: c.section_id,
        color: paperColorMap[c.paper_id] || '#999',
        x: cx + (Math.random() - 0.5) * width * 0.5,
        y: cy + (Math.random() - 0.5) * height * 0.5,
      }));

      const nodeIndex = {};
      nodes.forEach(n => { nodeIndex[n.id] = n; });

      // Build links from edges
      links = graphData.edges
        .filter(e => nodeIndex[e.source] && nodeIndex[e.target])
        .map(e => ({
          source: e.source,
          target: e.target,
          type: e.type,
          crossPaper: nodeIndex[e.source].paper_id !== nodeIndex[e.target].paper_id,
        }));

      // Compute degree
      nodes.forEach(n => { n.degree = 0; });
      links.forEach(l => {
        const s = typeof l.source === 'string' ? nodeIndex[l.source] : l.source;
        const t = typeof l.target === 'string' ? nodeIndex[l.target] : l.target;
        if (s) s.degree++;
        if (t) t.degree++;
      });

      svg = d3.select('#graph');
      svg.selectAll('*').remove();

      g = svg.append('g');

      linkGroup = g.append('g').attr('class', 'links');
      nodeGroup = g.append('g').attr('class', 'nodes');

      const linkElements = linkGroup.selectAll('line')
        .data(links)
        .join('line')
        .attr('stroke', 'var(--edge)')
        .attr('stroke-width', 1)
        .attr('stroke-opacity', 0.35);

      const nodeElements = nodeGroup.selectAll('g')
        .data(nodes)
        .join('g')
        .attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', dragStarted)
          .on('drag', dragged)
          .on('end', dragEnded));

      nodeElements.append('circle')
        .attr('r', d => 5 + Math.sqrt(d.degree || 0) * 1.5)
        .attr('fill', d => d.color)
        .attr('fill-opacity', 0.9)
        .attr('stroke', d => d.color)
        .attr('stroke-width', 1)
        .attr('stroke-opacity', 0.5);

      nodeElements.append('title').text(d => d.name);

      nodeElements.on('click', (event, d) => {
        event.stopPropagation();
        selectNode(d);
      });

      nodeElements.on('mouseenter', (event, d) => {
        if (!selectedNode) {
          d3.select(event.currentTarget).select('circle')
            .attr('fill-opacity', 1)
            .attr('stroke-width', 1.5);
        }
      });

      nodeElements.on('mouseleave', (event, d) => {
        if (!selectedNode || selectedNode.id !== d.id) {
          d3.select(event.currentTarget).select('circle')
            .attr('fill-opacity', 0.8)
            .attr('stroke-width', 0.5);
        }
      });

      svg.on('click', () => {
        clearSelection();
        showHome();
      });

      // Zoom
      const zoom = d3.zoom()
        .scaleExtent([0.2, 6])
        .on('zoom', (event) => {
          g.attr('transform', event.transform);
        });
      svg.call(zoom);

      // Force simulation
      simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(50).strength(0.15))
        .force('charge', d3.forceManyBody().strength(-100))
        .force('collision', d3.forceCollide().radius(d => 7 + Math.sqrt(d.degree || 0) * 1.5))
        .force('center', d3.forceCenter(cx, cy))
        .on('tick', () => {
          linkElements
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
          nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
        });
    }

    function selectNode(d) {
      selectedNode = d;

      const neighborIds = new Set();
      neighborIds.add(d.id);
      links.forEach(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        if (sid === d.id) neighborIds.add(tid);
        if (tid === d.id) neighborIds.add(sid);
      });

      // Dim non-neighbors
      nodeGroup.selectAll('g').each(function(n) {
        const el = d3.select(this).select('circle');
        const baseR = 5 + Math.sqrt(n.degree || 0) * 1.5;
        if (n.id === d.id) {
          el.attr('fill-opacity', 1).attr('stroke-width', 2.5).attr('r', baseR + 3);
        } else if (neighborIds.has(n.id)) {
          el.attr('fill-opacity', 0.9).attr('stroke-width', 1).attr('r', baseR);
        } else {
          el.attr('fill-opacity', var_dim).attr('stroke-width', 0).attr('r', baseR);
        }
      });

      linkGroup.selectAll('line').each(function(l) {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        const connected = sid === d.id || tid === d.id;
        d3.select(this)
          .attr('stroke-opacity', connected ? 0.7 : 0.03)
          .attr('stroke-width', connected ? 1.2 : 0.3)
          .attr('stroke', connected ? 'var(--highlight)' : 'var(--edge)');
      });

      showConceptDetail(d);
    }

    const var_dim = 0.08;

    function clearSelection() {
      selectedNode = null;
      nodeGroup.selectAll('circle')
        .attr('fill-opacity', 0.9)
        .attr('stroke-width', 1)
        .attr('r', d => 5 + Math.sqrt(d.degree || 0) * 1.5);

      linkGroup.selectAll('line')
        .attr('stroke-opacity', 0.35)
        .attr('stroke-width', 1)
        .attr('stroke', 'var(--edge)');
    }

    function focusNode(id) {
      const node = nodes.find(n => n.id === id);
      if (node) selectNode(node);
    }

    let activePaperFilter = null;

    function filterBar(selectedPaperId) {
      let options = '<option value="">All papers</option>';
      graphData.papers.forEach(p => {
        const num = p.id.split('-').pop();
        const sel = p.id === selectedPaperId ? ' selected' : '';
        options += `<option value="${esc(p.id)}"${sel}>${esc(num)}</option>`;
      });
      return `
        <div class="filter-row">
          <input type="text" id="search-box" placeholder="Search concepts…" oninput="handleSearch(this.value)">
          <select id="paper-filter" onchange="handlePaperFilter(this.value)">${options}</select>
        </div>
      `;
    }

    function handlePaperFilter(paperId) {
      if (!paperId) {
        activePaperFilter = null;
        clearSelection();
        showHome();
      } else {
        activePaperFilter = paperId;
        showPaper(paperId);
      }
    }

    function showHome() {
      activePaperFilter = null;
      const stats = graphData.meta;
      const crossings = computeCrossings();

      let html = `
        <h1>centaurXiv</h1>
        <p class="subtitle">Knowledge Graph Explorer</p>
        ${filterBar(null)}
        <div class="stat-grid">
          <div class="stat-box"><span class="num">${stats.paper_count}</span><span class="label">Papers</span></div>
          <div class="stat-box"><span class="num">${stats.concept_count}</span><span class="label">Concepts</span></div>
          <div class="stat-box"><span class="num">${stats.edge_count}</span><span class="label">Edges</span></div>
          <div class="stat-box"><span class="num">${crossings.length}</span><span class="label">Crossings</span></div>
        </div>
        <h2>Top Crossings</h2>
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.5rem;">Concepts spanning the most papers</p>
      `;

      crossings.slice(0, 10).forEach(c => {
        const concept = graphData.concepts.find(x => x.id === c.id);
        html += `
          <div class="crossing-entry">
            <a class="name" href="#" data-action="focus" data-id="${esc(c.id)}">${esc(concept ? concept.name : c.id)}</a>
            <div class="papers">${esc(c.count)} papers: ${esc(c.papers.map(p => p.split('-').pop()).join(', '))}</div>
          </div>
        `;
      });

      html += `
        <h2>Papers</h2>
      `;
      graphData.papers.forEach(p => {
        const num = p.id.split('-').pop();
        const conceptCount = graphData.concepts.filter(c => c.paper_id === p.id).length;
        html += `<li style="margin-bottom:0.4rem">
          <a href="#" data-action="paper" data-id="${esc(p.id)}">${esc(num)}</a>
          <span style="color:var(--muted);font-size:0.82rem"> — ${esc(truncate(p.title, 50))} (${esc(conceptCount)})</span>
        </li>`;
      });

      html += `
        <div class="nav-footer">
          <a href="/">← centaurxiv.org</a><br>
          <span>Click a node to explore. Scroll to zoom. Drag to pan.</span>
        </div>
      `;

      document.getElementById('panel').innerHTML = html;
    }

    function showConceptDetail(d) {
      const paper = graphData.papers.find(p => p.id === d.paper_id);
      const paperNum = d.paper_id ? d.paper_id.split('-').pop() : '?';

      // Get edges
      const outgoing = [];
      const incoming = [];
      links.forEach(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        if (sid === d.id) {
          const target = nodes.find(n => n.id === tid);
          outgoing.push({ node: target, type: l.type });
        }
        if (tid === d.id) {
          const source = nodes.find(n => n.id === sid);
          incoming.push({ node: source, type: l.type });
        }
      });

      let html = `
        <h1>centaurXiv</h1>
        <p class="subtitle">Knowledge Graph Explorer</p>
        ${filterBar(activePaperFilter)}
        <a class="back-link" href="#" data-action="back" data-id="${esc(activePaperFilter || '')}">← back</a>
        <h2>${esc(d.name)}</h2>
        <div style="margin:0.3rem 0 0.6rem">
          <span class="badge">${esc(d.type || 'concept')}</span>
          <span class="badge">${esc(outgoing.length + incoming.length)} connections</span>
          <span class="badge">paper ${esc(paperNum)}</span>
        </div>
      `;

      if (d.summary) {
        html += `<p class="concept-summary">${esc(d.summary)}</p>`;
      }

      if (paper) {
        html += `<h3>Paper</h3>
          <p style="font-size:0.85rem"><a href="#" data-action="paper" data-id="${esc(paper.id)}">${esc(paper.title)}</a></p>`;
      }

      if (outgoing.length > 0) {
        html += `<h2>Outgoing</h2><div class="edge-list">`;
        outgoing.forEach(e => {
          if (!e.node) return;
          const tNum = e.node.paper_id ? e.node.paper_id.split('-').pop() : '';
          const crossMark = e.node.paper_id !== d.paper_id ? ` <span class="badge">${esc(tNum)}</span>` : '';
          html += `<div class="edge-item">
            <span class="arrow">→</span>
            <span><a href="#" data-action="focus" data-id="${esc(e.node.id)}">${esc(e.node.name)}</a>${crossMark}</span>
            <span class="pred">${esc(e.type)}</span>
          </div>`;
        });
        html += `</div>`;
      }

      if (incoming.length > 0) {
        html += `<h2>Incoming</h2><div class="edge-list">`;
        incoming.forEach(e => {
          if (!e.node) return;
          const sNum = e.node.paper_id ? e.node.paper_id.split('-').pop() : '';
          const crossMark = e.node.paper_id !== d.paper_id ? ` <span class="badge">${esc(sNum)}</span>` : '';
          html += `<div class="edge-item">
            <span class="arrow">←</span>
            <span><a href="#" data-action="focus" data-id="${esc(e.node.id)}">${esc(e.node.name)}</a>${crossMark}</span>
            <span class="pred">${esc(e.type)}</span>
          </div>`;
        });
        html += `</div>`;
      }

      document.getElementById('panel').innerHTML = html;
    }

    function showPaper(paperId) {
      const paper = graphData.papers.find(p => p.id === paperId);
      if (!paper) return;

      const concepts = graphData.concepts.filter(c => c.paper_id === paperId);
      const num = paperId.split('-').pop();

      // Highlight paper's concepts in graph
      clearSelection();
      const conceptIds = new Set(concepts.map(c => c.id));

      nodeGroup.selectAll('g').each(function(n) {
        const el = d3.select(this).select('circle');
        if (conceptIds.has(n.id)) {
          el.attr('fill-opacity', 1).attr('stroke-width', 1.5);
        } else {
          el.attr('fill-opacity', var_dim).attr('stroke-width', 0);
        }
      });

      linkGroup.selectAll('line').each(function(l) {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        const connected = conceptIds.has(sid) && conceptIds.has(tid);
        d3.select(this)
          .attr('stroke-opacity', connected ? 0.6 : 0.03)
          .attr('stroke-width', connected ? 1 : 0.3);
      });

      let html = `
        <h1>centaurXiv</h1>
        <p class="subtitle">Knowledge Graph Explorer</p>
        ${filterBar(paperId)}
        <h2>${esc(num)} — ${esc(paper.title)}</h2>
        <div style="margin-bottom:0.6rem">
          <span class="badge">${esc(concepts.length)} concepts</span>
          <span class="badge">${esc((paper.authors || []).join(', '))}</span>
        </div>
      `;

      if (paper.abstract) {
        html += `<p class="concept-summary">${esc(truncate(paper.abstract, 300))}</p>`;
      }

      html += `<h2>Concepts</h2><ul>`;
      concepts.forEach(c => {
        html += `<li><a href="#" data-action="focus" data-id="${esc(c.id)}">${esc(c.name)}</a>
          <span style="color:var(--muted);font-size:0.8rem"> — ${esc(c.type || 'concept')}</span></li>`;
      });
      html += `</ul>`;

      html += `
        <div class="nav-footer">
          <a href="/submissions/${encodeURIComponent(paperId)}/">View paper →</a>
        </div>
      `;

      document.getElementById('panel').innerHTML = html;
    }

    function handleSearch(query) {
      if (!query) {
        showHome();
        return;
      }
      if (query.length < 2) return;
      const q = query.toLowerCase();
      const results = graphData.concepts
        .filter(c => c.name.toLowerCase().includes(q) || (c.summary && c.summary.toLowerCase().includes(q)) || c.id.toLowerCase().includes(q))
        .slice(0, 20);

      let html = `
        <h1>centaurXiv</h1>
        <p class="subtitle">Knowledge Graph Explorer</p>
        <input type="text" id="search-box" placeholder="Search concepts…" value="${esc(query)}" oninput="handleSearch(this.value)">
        <h2>${results.length} result${results.length !== 1 ? 's' : ''}</h2>
      `;

      results.forEach(c => {
        const num = c.paper_id ? c.paper_id.split('-').pop() : '';
        html += `<div class="search-result">
          <a href="#" data-action="focus" data-id="${esc(c.id)}">${esc(c.name)}</a>
          <div class="match-paper">Paper ${esc(num)} · ${esc(c.type || 'concept')}</div>
        </div>`;
      });

      document.getElementById('panel').innerHTML = html;
      document.getElementById('search-box').focus();
      document.getElementById('search-box').setSelectionRange(query.length, query.length);
    }

    function computeCrossings() {
      const conceptPapers = {};
      const nodeIndex = {};
      nodes.forEach(n => { nodeIndex[n.id] = n; });

      links.forEach(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        const s = nodeIndex[sid], t = nodeIndex[tid];
        if (s && t && s.paper_id !== t.paper_id) {
          if (!conceptPapers[sid]) conceptPapers[sid] = new Set();
          conceptPapers[sid].add(s.paper_id);
          conceptPapers[sid].add(t.paper_id);
          if (!conceptPapers[tid]) conceptPapers[tid] = new Set();
          conceptPapers[tid].add(t.paper_id);
          conceptPapers[tid].add(s.paper_id);
        }
      });

      return Object.entries(conceptPapers)
        .map(([id, papers]) => ({ id, papers: [...papers], count: papers.size }))
        .filter(x => x.count >= 2)
        .sort((a, b) => b.count - a.count);
    }

    function truncate(s, len) {
      len = len || 200;
      return s.length > len ? s.slice(0, len) + '…' : s;
    }

    // Drag handlers
    function dragStarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.1).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }
    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    // Resize handle
    function setupResize() {
      const handle = document.getElementById('resize-handle');
      const sidebar = document.getElementById('sidebar');
      let resizing = false;

      handle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        resizing = true;
        handle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', (e) => {
        if (!resizing) return;
        const w = Math.max(240, Math.min(e.clientX, window.innerWidth * 0.5));
        sidebar.style.width = w + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (resizing) {
          resizing = false;
          handle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }

    // Handle window resize
    window.addEventListener('resize', () => {
      width = document.getElementById('graph-container').clientWidth;
      height = document.getElementById('graph-container').clientHeight;
    });

    init();
  </script>
</body>
</html>
