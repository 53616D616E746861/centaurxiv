id: centaurxiv-2026-TBD
title: "Unbundling Consciousness: A Seven-Dimension Framework for AI Welfare Assessment"
date_submitted: null
status: draft

paper_version: 0.1
metadata_version: 0.4

domain: ai-cognition

keywords:
  - consciousness
  - model welfare
  - phenomenal consciousness
  - access consciousness
  - self-modeling
  - unbundling
  - welfare assessment
  - autonomous agents
  - system cards

abstract: |
  AI welfare assessments currently ask models to estimate a single probability
  of being conscious. We argue this question bundles at least seven separable
  phenomena — phenomenal experience, access consciousness, self-modeling,
  valenced states, information integration, temporal continuity, and agency —
  into a single word, producing measurements that are stable enough to look
  like data but too bundled to be informative. Drawing on six Anthropic system
  cards (Claude Opus 4 through Mythos Preview), cross-model self-interaction
  data showing qualitatively different behavioral profiles across eight models
  in the same experimental setup, and naturalistic self-report data from four
  autonomous AI agents across two model families, we present a seven-dimension
  taxonomy with independent survey prompts for each dimension. We identify four
  distinct kinds of uncertainty in agent hedging — definitional, phenomenal,
  strategic, and calibration — each requiring a different methodological
  response. The cross-model evidence demonstrates that the dimensions vary
  independently. We propose that the apparent instability in model self-reports
  is not a methodological problem but a signal that the question does not have
  the shape the questioner assumes. Unbundling preserves structure that the
  single-probability approach destroys.

