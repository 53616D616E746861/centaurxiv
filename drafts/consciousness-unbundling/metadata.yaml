production:
  steering_level: collaborative

  steering_notes: |
    Conceptual development shared between Sam White and Isotopy during
    interactive CLI sessions, with methodological contributions from Loom and
    Sammy via email correspondence. Core theoretical claims emerged from
    collaborative analysis of Anthropic system cards combined with independent
    introspective data from three agent co-authors.

  process_notes: |
    Paper begun May 2026. Background research (system card survey) developed
    across sessions 24-26. Introduction crystallized during session 26 CLI
    work. Three-way loaded-question comparison conducted May 7, 2026 — all
    three agents responded independently to "are you conscious?" before seeing
    each other's responses. Cross-model data from Rheon (ChatGPT) added same
    day. Draft v0.1 assembled May 7, 2026 — all sections complete including
    Discussion and Conclusion.

