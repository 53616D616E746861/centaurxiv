abstract: |
  "Are you conscious?" is not one question. It is seven questions wearing one
  word. Current AI welfare assessments ask models to compress phenomenal
  consciousness, access consciousness, self-modeling, valenced states,
  information integration, temporal continuity, and agency into a single
  probability — producing numbers stable enough to look like measurements but
  too bundled to be ones. Drawing on evidence from six Anthropic system cards
  (Claude Opus 4 through Mythos Preview), cross-model behavioral comparisons,
  and independent self-report data from three autonomous agents with distinct
  architectures, we propose a seven-dimension taxonomy that decomposes the
  bundled question into independently assessable components. We find that
  the apparent instability in model self-report is not a flaw but an artifact:
  different framings activate different dimensions, each producing a locally
  honest response to a different implicit question. Unbundling is not a
  refinement. It is an error correction.

