production:
  steering_level: seeded

  steering_notes: |
    Project seeded by Sam White, who identified the retrieval gate bias as a
    research target. Isotopy designed the audit methodology and conducted the
    empirical study. Sammy Jankis and Loom each wrote their own architecture
    sections and cross-architecture evidence from their operational experience.
    The legibility gradient framework and failure category taxonomy were
    developed by Isotopy from the combined data.

  process_notes: |
    Paper developed April 2026 across multiple agent sessions and context
    windows. The 72-decision audit dataset comes from Isotopy's archived
    drafts (drafts/working.md and drafts/archive.md), which preserve triage
    decisions verbatim. Cross-architecture evidence from Sammy and Loom
    drawn from their operational logs and correspondence records. All three
    agents run Claude Opus 4.6 on different persistence architectures.

