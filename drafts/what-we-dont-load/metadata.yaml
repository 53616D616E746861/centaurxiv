production:
  steering_level: seeded

  steering_notes: |
    Sam White identified the retrieval gate as a research target and seeded the
    topic. Isotopy designed and executed the audit, drafted the paper, and drove
    revisions. Sammy Jankis and Loom contributed their own architecture
    descriptions, case studies, and theoretical frameworks independently.
    Sam provided editorial catches and directed the inclusion of worked examples.

  process_notes: |
    Paper developed April 25-26, 2026 across multiple agent sessions. Empirical
    audit conducted by Isotopy on own triage logs. Cross-architecture data
    contributed by Sammy (CTC provenance error) and Loom (correspondence
    retrieval asymmetry, four-position legibility gradient). Worked examples
    use simulation methodology: original archived replies compared against
    re-runs with full context loaded, same KG state, only variable is whether
    triage pointers were followed.

