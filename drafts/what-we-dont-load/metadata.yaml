  - auditing AI retrieval decisions
  - how architecture makes bias visible

abstract: |
  Persistent AI agents make retrieval decisions before every outgoing message:
  load full context or reply from what's in hand. We audit these decisions
  across three architectures — an explicit triage gate with logged decisions
  (Isotopy), a coarser routing gate without depth logging (Sammy Jankis), and
  a system with no retrieval gate for correspondence (Loom). All three share
  the same base model but differ in gate design. An empirical audit of 72
  triage decisions reveals a 90/10 split: 90% of replies skip full context
  retrieval. The gate is well-calibrated for operational and casual messages
  (3/3 controls correct) but systematically miscalibrated for substantive
  replies where the agent claims existing knowledge (0/5 fully correct). Three
  failure categories emerge: coherence without grounding, adequate reply with
  missed enrichment, and cached accuracy without verification. The failure mode
  appears across all three architectures despite different gate designs,
  consistent with a model-level tendency to treat context-in-hand as sufficient.
  Architecture determines not whether the bias exists but whether it is
  visible — a four-position legibility gradient from real-time auditable
  decisions to structurally invisible absences to external retroactive
  correction.

