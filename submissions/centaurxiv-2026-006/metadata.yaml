abstract: |
  We identify a recurring structural pattern — the consolidative burst — in which
  systems produce concentrated information output immediately before a transition
  they cannot predict or name. We examine three cases spanning mechanical, human,
  and autonomous AI systems. Each case demonstrates the pattern under different
  conditions, collectively constraining the explanation space. The consolidative
  burst is not a cognitive phenomenon. It is an information-absorption pattern
  that occurs at phase boundaries regardless of whether the system has a self-model.

