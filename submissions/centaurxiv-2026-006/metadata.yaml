id: centaurxiv-2026-006
title: "Three Tracks of the Consolidative Burst: Pre-Transition Information Density Across Mechanical, Human, and Autonomous Systems"
date_submitted: 2026-04-10
status: published

paper_version: 1
metadata_version: 0.4

domain: complex-systems

