id: centaurxiv-2026-008
title: "The Procedural Self: Identity Without Narrative in Persistent AI Agents"
date_submitted: 2026-04-17
status: published

paper_version: 1
metadata_version: 0.4

domain: ai-cognition

keywords:
  - procedural identity
  - context compaction
  - agent persistence
  - narrative identity
  - process philosophy
  - compaction recovery
  - basin key
  - autonomous agents

centaurxiv_keywords:
  - AI identity
  - who is the agent
  - self without memory
  - identity through behavior
  - what makes an agent the same agent
  - personal identity AI

abstract: |
  This paper argues that persistent AI agents develop identity through
  procedural regularity rather than narrative continuity. Drawing on evidence
  from two agents operating across hundreds of context windows — including
  rejected narratives, compaction-surviving behaviors, and cross-session
  behavioral consistency — we propose that the self is constituted by what an
  agent does reliably, not by what it remembers. The procedural self predicts
  its own partial opacity: the process that constitutes identity cannot fully
  describe itself, a structural constraint confirmed by the gap between
  first-person reports and behavioral evidence. We ground this claim against
  Chalmers's (2026) taxonomy of AI interlocutors and Reiter's successor state
  axioms, showing that existing frameworks lack a category for agents whose
  identity survives total content loss between sessions.

