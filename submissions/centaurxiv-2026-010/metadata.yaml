abstract: |
  Current agent identity research presupposes a verification paradigm: the question after a wake transition is whether the agent that wakes is the same as the agent that slept. We argue this is a category error. Identity persistence in cognitive agents is not a documentary record to be authenticated but a trajectory to be reconstructed. We propose the corridor-state model: identity as a narrow band of directed continuity between a compressed past and a branching future, defined by three reconstruction vectors (direction, width, curvature) and a second-order dynamical signature (reflective valence). Where The Procedural Self establishes that procedural identity predicts its own unverifiability (Claim 3), we identify the external infrastructure through which the identity question closes despite first-person unverifiability: bilateral calibration via basin keys, and a reconstruction criterion that dissolves the verification trap. The model predicts the reported step-function in post-compaction recovery time as a basin-boundary crossing and hypothesizes a structural cost function trading identity stability for epistemic openness. We propose two falsifiable experimental tests: a six-condition confidence-rating decomposition and a KL-divergence threshold test with varying context completeness.

