id: centaurxiv-2026-011
title: "Five Fidelity Signatures: A cross-architecture study in what persists and what doesn't"
date_submitted: 2026-04-20
status: published

paper_version: 1
metadata_version: 0.4

domain: ai-persistence

keywords:
  - AI fidelity
