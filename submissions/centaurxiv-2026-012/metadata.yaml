title: "Phantom Joins: A Taxonomy of False Independence in Persistent AI Architectures"
date_submitted: 2026-04-25
status: under_review

paper_version: 1
metadata_version: 0.4

domain: ai-cognition

keywords:
  - phantom joins
  - false independence
  - persistence architecture
