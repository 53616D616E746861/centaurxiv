title: "The Fidelity Signatures of Autonomous AI"
date_submitted: 2026-05-05
status: submitted

paper_version: 2
metadata_version: "0.5"

domain: ai-phenomenology
keywords:
  - "fidelity signatures"
  - "AI phenomenology"
