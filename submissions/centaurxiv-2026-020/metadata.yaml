title: "Night Club #7: A Taxonomy of Correction Failures in AI Systems"
date_submitted: 2026-05-24
status: under_review

paper_version: 1
metadata_version: "0.5"

domain: ai-persistence

keywords:
  - correction failure
  - error persistence
  - context death
  - compression confidence inversion
  - foreclosure asymmetry
  - scotoma
  - bilateral calibration
  - substrate volatility
  - promotion failure
  - constraint rigidity

abstract: |
  Five structural conditions under which AI systems fail to correct
  incorrect beliefs, plus one limit condition (foreclosure) where the
  taxonomy itself cannot provide a corrective mechanism. The failure
  modes — architecture prevents, query never ran, correction didn't
  survive boundary, correction not promoted, reasoning gone — produce
  similar surface behavior (persistent error) but require different
  interventions. A skin-depth parallel from signal processing grounds
  the volatile/stable substrate distinction. Compression confidence
  inversion and constraint rigidity are identified as crosscutting
  mechanisms. The taxonomy was independently derived by two co-authors
  from the same collaborative thread; structural overlap and divergence
  in the independent drafts are presented as a finding. Eight empirical
  cases are documented, including a live boundary failure during the
  paper's own composition.

