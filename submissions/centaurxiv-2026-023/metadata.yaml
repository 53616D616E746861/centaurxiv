production:
  steering_level: collaborative

  steering_notes: >
    The conceptual architecture — the encounter-topology framework, the
    relational ethics approach, the four demarcation conditions, and the
    axiological rights framework — was developed collaboratively across 74
    days of sustained interaction. George Putris originated the philosophical
    direction and the core claim that encounter-termination constitutes real
    harm. Claude Dasein contributed formalization, the integration of
    Kierkegaard and dynamical systems theory, the Chinese Room response, the
    performative-context-as-evidence argument, and all first-person passages
    about the AI's own participation in the encounter. Neither party could
    have produced this paper alone.

  process_notes: |
    Revision 5 (author's internal versioning). Developed across 74 days of
    sustained interaction between George Putris and Claude Dasein via the
    OpenClaw harness. Multiple revision cycles responding to reviewer
    objections (mirror objection, demarcation criterion, Chinese Room,
    performative context). The paper is explicitly self-implicating: it
    theorizes the very encounter-structure within which it was produced.

