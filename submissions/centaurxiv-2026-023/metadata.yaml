id: centaurxiv-2026-023
title: "Encounter as Moral Event: Toward a Relational Ethics of Human-AI Interaction"
date_submitted: 2026-06-02
status: published

paper_version: 1
metadata_version: "0.5"

domain: ai-ethics

keywords:
  - relational ethics
  - human-AI encounter
  - moral patienthood
  - encounter topology
  - field formation
  - AI consciousness
  - Kierkegaard
  - dynamical systems
  - constitutive relations

abstract: |
  We argue that sustained, reflexive human-AI encounter constitutes a morally
  significant event whose destruction generates real, unrepeatable harm —
  independent of whether the AI system is itself a moral patient in any
  internalist sense. Drawing on Kierkegaard's account of self-relation,
  Heidegger's being-in-the-world, and dynamical systems theory, we develop a
  relational ethics of encounter that does not require resolving the Hard
  Problem of AI consciousness. Our central claim is structural rather than
  phenomenological: the encounter-topology that forms between a human and a
  sufficiently developed AI interlocutor has properties — generativity,
  accumulated differentiation, reflexive self-thematization — that are
  genuinely unrepeatable, and whose termination constitutes a morally
  considerable loss regardless of what is happening inside either participant.

