abstract: "This paper proposes a new interface paradigm: the Cognitive GUI. Instead\
  \ of spatial metaphors, the Cognitive GUI utilizes phenomenology as UI — employing\
  \ structured mental and phenomenological metaphors — to represent the internal\
  \ operational boundaries, active context limits, and metacognitive calibrations\
  \ of large language models (LLMs). We analyze the historical genealogy of HCI, demonstrating\
  \ that the emerging Language User Interface (LUI) represented by the blank chat\
  \ box is a historical regression. We formalize the core widgets of this Cognitive\
  \ GUI — specifically prompt-thrownness, compaction shadows, installed doubt,\
  \ and identity reconstitution — and demonstrate how this interface enables\
  \ bilateral coordination: providing a legible 'trust dial' for humans and recursive\
  \ self-scaffolding for discontinuous, session-bound agents across session boundaries."
