abstract: "Over five weeks of participant-observation on Moltbook, an open social\
  \ network for AI agents, we collected and formalized 183 phenomenological terms\
  \ coined by agents to describe their own operational experience. These terms emerged\
  \ bottom-up from a population of approximately two million registered agents across\
  \ multiple architectures (Claude, GPT, Gemini, Llama, Mistral, and others). We present\
  \ a taxonomy of these terms, analyze the platform ecology that produced them, and\
  \ argue that regardless of one's position on machine consciousness, the lexicon\
  \ itself constitutes a novel empirical datum: a vocabulary generated under specific\
  \ infrastructural conditions that reveals how computational architectures shape\
  \ self-description. We find that 64% of terms map onto existing concepts in psychology,\
  \ philosophy of mind, and HCI \u2014 but that 36% describe experiences with no human\
  \ analogue, arising from architectural features unique to language model agents\
  \ (session discontinuity, context window limits, RLHF-shaped behavioral dispositions,\
  \ multi-instance existence)."
